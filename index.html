<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QRツイン リーダー (All-in-One)</title>
    <meta name="apple-mobile-web-app-title" content="QRツイン">
    <meta name="theme-color" content="#121212">

    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: 0; background-color: #121212; color: #ffffff; text-align: center; }
        h2 { margin: 15px 0; font-size: 1.2rem; }
        #startScreen, #resultScreen { padding: 20px; margin-top: 50px; }
        #resultScreen { display: none; }
        .camera-container { position: relative; width: 100%; max-width: 600px; margin: 0 auto; background: #000; display: none; }
        video { width: 100%; display: block; object-fit: cover; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .status-panel { padding: 15px; background: #1e1e1e; border-top: 1px solid #333; text-align: left; max-width: 600px; margin: 0 auto; display: none; }
        .qr-result { margin-bottom: 10px; padding: 10px; border-radius: 8px; background: #2c2c2c; word-break: break-all; }
        .qr-1 { border-left: 5px solid #00E676; }
        .qr-2 { border-left: 5px solid #29B6F6; }
        .qr-lock { border-left: 5px solid #ff4d4d; color: #ff9999; }
        button { width: 100%; max-width: 300px; padding: 15px; font-size: 1.1rem; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; margin-top: 10px; }
        #startBtn { background: #81C784; color: #121212; transition: 0.3s; } 
        #startBtn:active { background: #66BB6A; }
        #startBtn:disabled { background: #555; color: #aaa; cursor: not-allowed; }
        #backBtn { background: #03DAC6; color: #000; margin-top: 30px; }
    </style>
</head>
<body>

    <h2>📱 QRツイン リーダー</h2>
    
    <div id="startScreen">
        <p style="color: #aaa; font-size: 0.9rem; margin-bottom: 20px;">QRツインを読み取ります。（暗号化完全対応）</p>
        <button id="startBtn" disabled>🚀 読取エンジンを構築中...</button>
    </div>

    <div class="camera-container" id="cameraContainer">
        <video id="video" playsinline autoplay muted></video>
        <canvas id="overlayCanvas"></canvas>
    </div>

    <div class="status-panel" id="statusPanel">
        <div id="detectorInfo" style="font-size: 0.8rem; color: #aaa; margin-bottom: 10px;">エンジン: In-Memory Twin Engine</div>
        <div class="qr-result qr-1" id="box1">
            <strong>第1QR:</strong> <span id="text1">未検出</span>
        </div>
        <div class="qr-result qr-2" id="box2">
            <strong>第2QR:</strong> <span id="text2">未検出</span>
        </div>
    </div>

    <div id="resultScreen">
        <h3 style="color: #00E676; margin-bottom: 20px;">✅ 読み取り完了！</h3>
        <div class="qr-result qr-1" style="text-align: left;">
            <strong>第1QR:</strong><br> <span id="finalText1"></span>
        </div>
        <div class="qr-result qr-2" style="text-align: left;">
            <strong>第2QR (復号済):</strong><br> <span id="finalText2"></span>
        </div>
        <button id="backBtn" onclick="goBack()">🔙 もとのカメラ画面に戻る</button>
    </div>

<script>
    // ==========================================
    // 1. 暗号化・復号・管理部解析ユーティリティ
    // ==========================================
    window.TwinCrypto = {
        sha256Bytes: async function(msgBytes) {
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBytes);
            return new Uint8Array(hashBuffer);
        },
        deriveMask: async function(password, neededBytes) {
            const out = new Uint8Array(neededBytes);
            let filled = 0;
            const pwBytes = new TextEncoder().encode(password);
            let h = await this.sha256Bytes(pwBytes);
            while (filled < neededBytes) {
                const take = Math.min(32, neededBytes - filled);
                out.set(h.subarray(0, take), filled);
                filled += take;
                if (filled >= neededBytes) break;
                h = await this.sha256Bytes(h); 
            }
            return out;
        },
        getMgmtBits: function(rawBytes, decodedText) {
            try {
                const textLength = new TextEncoder().encode(decodedText).length;
                let bitOffset = 0;
                const readBits = (n) => {
                    let val = 0;
                    for(let i=0; i<n; i++) {
                        const byteIdx = Math.floor(bitOffset / 8);
                        if(byteIdx >= rawBytes.length) return null;
                        val = (val << 1) | ((rawBytes[byteIdx] >> (7 - (bitOffset % 8))) & 1);
                        bitOffset++;
                    }
                    return val;
                };
                const mode = readBits(4);
                if (mode !== 4) return null;
                let len = readBits(8);
                if (len !== textLength) {
                    bitOffset = 4;
                    len = readBits(16);
                    if (len !== textLength) return null;
                }
                bitOffset += len * 8;
                const remaining = (rawBytes.length * 8) - bitOffset;
                readBits(Math.min(4, remaining)); // 終端子
                if ((rawBytes.length * 8) - bitOffset >= 16) {
                    return readBits(16);
                }
                return null;
            } catch(e) { return null; }
        },
        isAppEncrypted: function(mgmtBits) {
            if (mgmtBits === null) return false;
            return ((mgmtBits >> 8) & 1) === 1; 
        }
    };

    // ==========================================
    // 2. エンジンの自動ダウンロード＆メモリ上での魔改造パッチ
    // ==========================================
    window.addEventListener('DOMContentLoaded', async () => {
        const btn = document.getElementById('startBtn');
        try {
            // 公式ZXingの取得
            const res = await fetch("https://unpkg.com/@zxing/library@0.21.0/umd/index.js");
            if (!res.ok) throw new Error("ネットワークエラー");
            let source = await res.text();

            // コア処理（BitMatrixParser）を正規表現で探し、強制的にXOR処理を注入
            const patchRegex = /(BitMatrixParser\.prototype\.readCodewords\s*=\s*function\s*\([\s\S]*?\{[\s\S]*?)(return\s+result\s*;)/;
            if (!patchRegex.test(source)) throw new Error("パッチ適用箇所が見つかりません");

            source = source.replace(patchRegex, `$1
                if (typeof window !== "undefined" && window.__applyTwinXor && window.twinDecryptMask) {
                    for (var i = 0; i < result.length; i++) {
                        result[i] ^= window.twinDecryptMask[i % window.twinDecryptMask.length];
                    }
                }
            $2`);

            // 改造済みコードをブラウザに読み込ませる
            const script = document.createElement('script');
            script.textContent = source;
            document.head.appendChild(script);

            btn.innerText = "📷 カメラを起動する";
            btn.disabled = false;
            btn.onclick = startApp;
        } catch(e) {
            btn.innerText = "⚠️ 読込エラー（画面を再読込してください）";
            alert("エンジンの構築に失敗しました。インターネット接続を確認してください。\n詳細: " + e.message);
        }
    });

    // ==========================================
    // 3. メインアプリケーションのロジック
    // ==========================================
    const video = document.getElementById('video');
    const overlayCanvas = document.getElementById('overlayCanvas');
    const ctx = overlayCanvas.getContext('2d');
    const zxingCanvas = document.createElement('canvas');
    const zxingCtx = zxingCanvas.getContext('2d', { willReadFrequently: true });

    let isScanning = false, isProcessing = false, isPromptingPassword = false;
    let zxingMultiReader = null;
    let firstQR = null, secondQR = null;

    async function startApp() {
        document.getElementById('startBtn').disabled = true;
        zxingMultiReader = new ZXing.qrcode.QRCodeMultiReader();
        window.twinDecryptMask = null;
        window.__applyTwinXor = false;

        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
            video.srcObject = stream;
            await new Promise(r => { video.onloadedmetadata = r; setTimeout(r, 1000); });
            await video.play();
            isScanning = true;
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('cameraContainer').style.display = 'block';
            document.getElementById('statusPanel').style.display = 'block';
            requestAnimationFrame(scanLoop);
        } catch (err) {
            alert("カメラエラー: " + err.message);
            document.getElementById('startBtn').disabled = false;
        }
    }

    async function scanLoop() {
        if (!isScanning) return;
        if (video.videoWidth) {
            overlayCanvas.width = video.videoWidth;
            overlayCanvas.height = video.videoHeight;
        }
        ctx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);

        if (firstQR) drawBoundingBox(firstQR.points, '#00E676');
        if (secondQR) drawBoundingBox(secondQR.points, secondQR.isEncrypted ? '#ff4d4d' : '#29B6F6');

        if (!isProcessing && video.readyState >= 2 && !isPromptingPassword) {
            isProcessing = true;
            try {
                zxingCanvas.width = overlayCanvas.width; zxingCanvas.height = overlayCanvas.height;
                zxingCtx.drawImage(video, 0, 0, zxingCanvas.width, zxingCanvas.height);
                
                const luminanceSource = new ZXing.HTMLCanvasElementLuminanceSource(zxingCanvas);
                const binaryBitmap = new ZXing.BinaryBitmap(new ZXing.HybridBinarizer(luminanceSource));
                const hints = new Map(); hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [ZXing.BarcodeFormat.QR_CODE]);
                
                // STEP A: 通常モードでのスキャン（第1QRの発見）
                window.__applyTwinXor = false;
                let results = [];
                try { results = zxingMultiReader.decodeMultiple(binaryBitmap, hints); } catch(e){}
                await processResults(results, false);

                // STEP B: 暗号化マスクが準備完了していれば、同じフレームをXOR復号モードで再スキャン（第2QRの発見）
                if (window.twinDecryptMask) {
                    window.__applyTwinXor = true;
                    try {
                        const encryptedResults = zxingMultiReader.decodeMultiple(binaryBitmap, hints);
                        await processResults(encryptedResults, true);
                    } catch(e) {}
                    window.__applyTwinXor = false;
                }
            } catch (err) {}
            isProcessing = false;
        }

        if (firstQR && secondQR) {
            showResultScreen();
            isScanning = false;
            return;
        }
        requestAnimationFrame(scanLoop);
    }

    async function processResults(results, isEncryptedMode) {
        for (const r of results) {
            const pts = r.getResultPoints().map(p => ({ x: p.getX(), y: p.getY() }));
            const text = r.getText();

            if (!isEncryptedMode) {
                if (!firstQR || firstQR.text !== text) {
                    firstQR = { text, points: pts, isEncrypted: false };
                    document.getElementById('text1').innerText = text;
                    
                    const rawBytes = r.getRawBytes();
                    const mgmtBits = rawBytes ? TwinCrypto.getMgmtBits(rawBytes, text) : null;
                    const isAppEncrypted = TwinCrypto.isAppEncrypted(mgmtBits);

                    if (isAppEncrypted && !window.twinDecryptMask && !isPromptingPassword) {
                        isPromptingPassword = true;
                        setTimeout(async () => {
                            const pwd = prompt("🔒 第2QRコードが暗号化されています。\nパスワードを入力してください。");
                            if (pwd) {
                                // 余裕を持たせた4000byteのマスクを一括生成して適用
                                window.twinDecryptMask = await TwinCrypto.deriveMask(pwd, 4000);
                                document.getElementById('box2').classList.add("qr-lock");
                                document.getElementById('text2').innerText = "🔑 復号マスク適用中...";
                            }
                            isPromptingPassword = false;
                        }, 100);
                    }
                } else {
                    firstQR.points = pts;
                }
            } else {
                if (firstQR && text === firstQR.text) continue; // 第1QRの誤検知を除外
                if (!secondQR) {
                    secondQR = { text, points: pts, isEncrypted: true };
                    document.getElementById('text2').innerText = text;
                    document.getElementById('box2').classList.remove("qr-lock");
                } else {
                    secondQR.points = pts;
                }
            }
        }
    }

    function formatResultText(text) {
        if (/^https?:\/\//i.test(text)) return `<a href="${text}" target="_blank" style="color: #03DAC6;">${text}</a>`;
        const div = document.createElement('div'); div.innerText = text; return div.innerHTML;
    }

    function showResultScreen() {
        if (navigator.vibrate) navigator.vibrate([40, 30, 40]); 
        document.getElementById('cameraContainer').style.display = 'none';
        document.getElementById('statusPanel').style.display = 'none';
        document.getElementById('resultScreen').style.display = 'block';
        document.getElementById('finalText1').innerHTML = formatResultText(firstQR.text);
        document.getElementById('finalText2').innerHTML = formatResultText(secondQR.text);
    }

    function goBack() {
        firstQR = null; secondQR = null;
        window.twinDecryptMask = null; window.__applyTwinXor = false;
        document.getElementById('text1').innerText = "未検出"; document.getElementById('text2').innerText = "未検出";
        document.getElementById('box2').classList.remove("qr-lock");
        document.getElementById('resultScreen').style.display = 'none';
        document.getElementById('cameraContainer').style.display = 'block';
        document.getElementById('statusPanel').style.display = 'block';
        isScanning = true; requestAnimationFrame(scanLoop);
    }

    function drawBoundingBox(points, color) {
        if (!points || points.length < 3) return;
        ctx.beginPath(); ctx.moveTo(points[0].x, points[0].y);
        for (let i = 1; i < points.length; i++) ctx.lineTo(points[i].x, points[i].y);
        ctx.closePath(); ctx.lineWidth = 4; ctx.strokeStyle = color; ctx.stroke();
        ctx.fillStyle = color + '44'; ctx.fill();
    }
</script>
</body>
</html>
