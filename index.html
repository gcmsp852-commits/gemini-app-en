<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QRツイン リーダー</title>
    <meta name="apple-mobile-web-app-title" content="QRツイン">
    <meta name="application-name" content="QRツイン">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">

    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#121212">

    <link rel="apple-touch-icon" sizes="180x180" href="icon.png">
    <link rel="icon" type="image/png" sizes="512x512" href="icon.png">
    <link rel="manifest" href="manifest.json">
    
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0; padding: 0; background-color: #121212; color: #ffffff; text-align: center;
        }
        h2 { margin: 15px 0; font-size: 1.2rem; }
        
        #startScreen, #resultScreen { padding: 20px; margin-top: 50px; }
        #resultScreen { display: none; }

        .camera-container {
            position: relative; width: 100%; max-width: 600px; margin: 0 auto; background: #000; display: none;
        }
        video { width: 100%; display: block; object-fit: cover; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        
        .status-panel {
            padding: 15px; background: #1e1e1e; border-top: 1px solid #333; text-align: left; max-width: 600px; margin: 0 auto; display: none;
        }
        
        .qr-result { margin-bottom: 10px; padding: 10px; border-radius: 8px; background: #2c2c2c; word-break: break-all; }
        .qr-1 { border-left: 5px solid #00E676; }
        .qr-2 { border-left: 5px solid #29B6F6; }
        
        button {
            width: 100%; max-width: 300px; padding: 15px; font-size: 1.1rem; font-weight: bold; 
            background: #6200EE; color: white; border: none; border-radius: 8px; cursor: pointer; margin-top: 10px;
        }
        button:disabled { background: #555; cursor: not-allowed; color: #aaa; }
        
        /* ▼▼▼ お客様の変更点：起動ボタンを薄緑色に指定、文字色を見やすく調整 ▼▼▼ */
        #startBtn { background: #81C784; color: #121212; } 
        #startBtn:active { background: #66BB6A; }
        
        #backBtn { background: #03DAC6; color: #000; margin-top: 30px; }
        #backBtn:active { background: #018786; }
    </style>
</head>
<body>

    <h2>📱 QRツイン リーダー</h2>
    
    <div id="startScreen">
        <p style="color: #aaa; font-size: 0.9rem; margin-bottom: 20px;">
            2つのQRコードを同時に、または連続して読み取ります。<br>
            <span style="font-size: 0.75rem; color: #888;">(QRツイン暗号化・管理部解析対応)</span>
        </p>
        <button id="startBtn" onclick="startApp()">📷 カメラを起動する</button>
    </div>

    <div class="camera-container" id="cameraContainer">
        <video id="video" playsinline autoplay muted></video>
        <canvas id="overlayCanvas"></canvas>
    </div>

    <div class="status-panel" id="statusPanel">
        <div id="detectorInfo" style="font-size: 0.8rem; color: #aaa; margin-bottom: 10px;">読取エンジン準備中...</div>
        <div class="qr-result qr-1">
            <strong>1個目:</strong> <span id="text1">未検出</span>
        </div>
        <div class="qr-result qr-2">
            <strong>2個目:</strong> <span id="text2">未検出</span>
        </div>
    </div>

    <div id="resultScreen">
        <h3 style="color: #00E676; margin-bottom: 20px;">✅ 読み取り完了！</h3>
        <div class="qr-result qr-1" style="text-align: left;">
            <strong>1個目:</strong><br> <span id="finalText1"></span>
        </div>
        <div class="qr-result qr-2" style="text-align: left;">
            <strong>2個目:</strong><br> <span id="finalText2"></span>
        </div>
        <button id="backBtn" onclick="goBack()">🔙 もとのカメラ画面に戻る</button>
    </div>

<script>
    // ==========================================
    // 1. 暗号化・復号・管理部解析ユーティリティ
    // ==========================================
    window.TwinCrypto = {
        sha256Bytes: async function(msgBytes) {
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBytes);
            return new Uint8Array(hashBuffer);
        },
        deriveMask: async function(password, neededBytes) {
            const out = new Uint8Array(neededBytes);
            let filled = 0;
            const pwBytes = new TextEncoder().encode(password);
            let h = await this.sha256Bytes(pwBytes);
            while (filled < neededBytes) {
                const take = Math.min(32, neededBytes - filled);
                out.set(h.subarray(0, take), filled);
                filled += take;
                if (filled >= neededBytes) break;
                h = await this.sha256Bytes(h); 
            }
            return out;
        },
        getMgmtBits: function(rawBytes, decodedText) {
            try {
                if (!rawBytes) return null;
                const textLength = new TextEncoder().encode(decodedText).length;
                let bitOffset = 0;
                const readBits = (n) => {
                    let val = 0;
                    for(let i=0; i<n; i++) {
                        const byteIdx = Math.floor(bitOffset / 8);
                        if(byteIdx >= rawBytes.length) return null;
                        val = (val << 1) | ((rawBytes[byteIdx] >> (7 - (bitOffset % 8))) & 1);
                        bitOffset++;
                    }
                    return val;
                };
                const mode = readBits(4);
                if (mode !== 4) return null;
                let len = readBits(8);
                if (len !== textLength) {
                    bitOffset = 4;
                    len = readBits(16);
                    if (len !== textLength) return null;
                }
                bitOffset += len * 8;
                const remaining = (rawBytes.length * 8) - bitOffset;
                readBits(Math.min(4, remaining)); // 終端子をスキップ
                if ((rawBytes.length * 8) - bitOffset >= 16) {
                    return readBits(16);
                }
                return null;
            } catch(e) { return null; }
        },
        isAppEncrypted: function(mgmtBits) {
            if (mgmtBits === null) return false;
            return ((mgmtBits >> 8) & 1) === 1; 
        }
    };

    // ==========================================
    // 2. メイン処理・UI制御
    // ==========================================
    const video = document.getElementById('video');
    const overlayCanvas = document.getElementById('overlayCanvas');
    const ctx = overlayCanvas.getContext('2d');
    
    const zxingCanvas = document.createElement('canvas');
    const zxingCtx = zxingCanvas.getContext('2d', { willReadFrequently: true });

    let isProcessing = false;
    let isScanning = false;
    let isPromptingPassword = false;
    let lastDetectTime = 0;
    const SCAN_INTERVAL_MS = 200; 
    
    let zxingReader = null;
    let firstQR = null;
    let secondQR = null;

    async function startApp() {
        const startBtn = document.getElementById('startBtn');
        startBtn.disabled = true;
        startBtn.innerText = "エンジン構築中...";

        try {
            await initEngines();
        } catch (e) {
            startBtn.disabled = false;
            startBtn.innerText = "📷 カメラを起動する";
            return;
        }

        startBtn.innerText = "カメラ準備中...";
        const success = await startCamera();
        
        if (success) {
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('cameraContainer').style.display = 'block';
            document.getElementById('statusPanel').style.display = 'block';
        } else {
            startBtn.disabled = false;
            startBtn.innerText = "📷 カメラを起動する";
        }
    }

    // 波括弧カウント方式で絶対に失敗しない魔改造エンジンジェネレーター
    async function initEngines() {
        try {
            const res = await fetch("https://unpkg.com/@zxing/library@0.21.0/umd/index.js");
            if (!res.ok) throw new Error("ネットワークエラー: " + res.status);
            let source = await res.text();

            let isPatched = false;
            let startIdx = source.indexOf(".prototype.readCodewords = function");
            if (startIdx === -1) startIdx = source.indexOf(".prototype.readCodewords=function");
            
            if (startIdx !== -1) {
                let openBraceIdx = source.indexOf("{", startIdx);
                let braceCount = 1;
                let i = openBraceIdx + 1;
                // 波括弧の数を数えて関数ブロックの終わりを特定
                while (braceCount > 0 && i < source.length) {
                    if (source[i] === "{") braceCount++;
                    else if (source[i] === "}") braceCount--;
                    i++;
                }
                let closeBraceIdx = i - 1;
                let funcBody = source.substring(openBraceIdx + 1, closeBraceIdx);
                
                // ブロックの最後にある return 文を探す
                let lastReturnIdx = funcBody.lastIndexOf("return");
                if (lastReturnIdx !== -1) {
                    let beforeReturn = funcBody.substring(0, lastReturnIdx);
                    let returnStmt = funcBody.substring(lastReturnIdx);
                    
                    let returnMatch = returnStmt.match(/return\s+([a-zA-Z0-9_$]+)/);
                    if (returnMatch) {
                        let varName = returnMatch[1];
                        let injected = `
                            if (typeof window !== 'undefined' && window.__applyTwinXor && window.twinDecryptMask) {
                                for (var _i = 0; _i < ${varName}.length; _i++) {
                                    ${varName}[_i] ^= window.twinDecryptMask[_i % window.twinDecryptMask.length];
                                }
                            }
                        `;
                        let newFuncBody = beforeReturn + injected + returnStmt;
                        source = source.substring(0, openBraceIdx + 1) + newFuncBody + source.substring(closeBraceIdx);
                        isPatched = true;
                    }
                }
            }
            
            if (!isPatched) {
                throw new Error("バッチ適用箇所が見つかりません。ライブラリの構造が想定と異なります。");
            }

            // メモリ上に改造済みのライブラリを展開
            const script = document.createElement('script');
            script.textContent = source;
            document.head.appendChild(script);

            await new Promise(r => setTimeout(r, 150));

            if (typeof ZXing !== 'undefined') {
                zxingReader = new ZXing.BrowserQRCodeReader();
                document.getElementById('detectorInfo').innerText = "⚡ エンジン: ZXing Custom (管理部解析・XOR復号対応)";
            } else {
                throw new Error("ZXingの初期化に失敗しました。");
            }
        } catch (e) {
            alert("ZXingエンジンの構築に失敗しました。\n詳細: " + e.message);
            throw e;
        }
    }

    async function startCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
            video.srcObject = stream;
            
            await new Promise((resolve) => {
                video.onloadedmetadata = resolve;
                setTimeout(resolve, 1000); 
            });
            
            await video.play().catch(e => console.warn("自動再生ブロック:", e));
            
            isScanning = true;
            window.twinDecryptMask = null;
            window.__applyTwinXor = false;
            requestAnimationFrame(scanLoop);
            return true;
        } catch (err) {
            alert("カメラを起動できませんでした。\nエラー: " + err.message);
            return false;
        }
    }

    function maskOutBoundingBox(context, points) {
        if (!points || points.length === 0) return;
        let minX = Infinity, minY = Infinity, maxX = 0, maxY = 0;
        points.forEach(p => {
            const x = p.getX ? p.getX() : p.x;
            const y = p.getY ? p.getY() : p.y;
            if (x < minX) minX = x;
            if (y < minY) minY = y;
            if (x > maxX) maxX = x;
            if (y > maxY) maxY = y;
        });
        const w = maxX - minX;
        const h = maxY - minY;
        const padX = w * 0.2;
        const padY = h * 0.2;
        context.fillStyle = '#000000';
        context.fillRect(minX - padX, minY - padY, w + padX * 2, h + padY * 2);
    }

    async function scanLoop() {
        if (!isScanning) return;

        if (video.videoWidth && overlayCanvas.width !== video.videoWidth) {
            overlayCanvas.width = video.videoWidth;
            overlayCanvas.height = video.videoHeight;
        }

        ctx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);

        if (firstQR) drawBoundingBox(firstQR.points, '#00E676');
        if (secondQR) drawBoundingBox(secondQR.points, '#29B6F6');

        const now = Date.now();
        if (!isProcessing && now - lastDetectTime > SCAN_INTERVAL_MS && video.readyState >= 2 && !isPromptingPassword) {
            isProcessing = true;
            lastDetectTime = now;
            
            zxingCanvas.width = overlayCanvas.width;
            zxingCanvas.height = overlayCanvas.height;
            zxingCtx.drawImage(video, 0, 0, zxingCanvas.width, zxingCanvas.height);

            // 1. 第1QRの探索 (通常モード)
            window.__applyTwinXor = false;
            let normalRes = null;
            try { normalRes = zxingReader.decodeFromCanvas(zxingCanvas); } catch(e){}

            if (normalRes) await processNormalResult(normalRes);

            // 2. 第2QRの探索 (マスク適用 ＆ XOR復号モード)
            if (window.twinDecryptMask) {
                if (firstQR) {
                    // 第1QRが見つかっている場合は黒塗りして隠す（第2QRだけを見つけるため）
                    maskOutBoundingBox(zxingCtx, firstQR.points);
                }
                window.__applyTwinXor = true;
                let encryptedRes = null;
                try { encryptedRes = zxingReader.decodeFromCanvas(zxingCanvas); } catch(e) {}
                window.__applyTwinXor = false;

                if (encryptedRes) await processEncryptedResult(encryptedRes);
            }

            isProcessing = false;
        }

        if (firstQR && secondQR) {
            showResultScreen();
            isScanning = false;
            return;
        }

        requestAnimationFrame(scanLoop);
    }

    async function processNormalResult(r) {
        const pts = r.getResultPoints().map(p => ({ x: p.getX(), y: p.getY() }));
        const text = r.getText();

        if (!firstQR || firstQR.text !== text) {
            firstQR = { text, points: pts };
            document.getElementById('text1').innerText = text;

            // ネイティブには存在しない「生データ（rawBytes）」を抽出
            const rawBytes = typeof r.getRawBytes === 'function' ? r.getRawBytes() : r.rawBytes;
            const mgmtBits = TwinCrypto.getMgmtBits(rawBytes, text);
            const isAppEncrypted = TwinCrypto.isAppEncrypted(mgmtBits);

            if (isAppEncrypted && !window.twinDecryptMask && !isPromptingPassword) {
                isPromptingPassword = true;
                setTimeout(async () => {
                    const pwd = prompt("🔒 第2QRコードが暗号化されています。\nパスワードを入力してください。");
                    if (pwd) {
                        window.twinDecryptMask = await TwinCrypto.deriveMask(pwd, 4000);
                        document.getElementById('text2').innerText = "🔑 復号マスク適用中...";
                    } else {
                        // キャンセル時はリセット
                        firstQR = null;
                        document.getElementById('text1').innerText = "未検出";
                    }
                    isPromptingPassword = false;
                }, 100);
            }
        } else {
            firstQR.points = pts;
        }
    }

    async function processEncryptedResult(r) {
        const pts = r.getResultPoints().map(p => ({ x: p.getX(), y: p.getY() }));
        const text = r.getText();

        if (firstQR && text === firstQR.text) return; // 誤検知除外

        if (!secondQR || secondQR.text !== text) {
            secondQR = { text, points: pts };
            document.getElementById('text2').innerText = text;
        } else {
            secondQR.points = pts;
        }
    }

    function formatResultText(text) {
        if (/^https?:\/\//i.test(text)) {
            return `<a href="${text}" target="_blank" rel="noopener noreferrer" style="color: #03DAC6; text-decoration: underline; font-weight: bold;">${text}</a>`;
        }
        const div = document.createElement('div');
        div.innerText = text;
        return div.innerHTML;
    }

    function showResultScreen() {
        if (navigator.vibrate) navigator.vibrate([40, 30, 40]); 
        document.getElementById('cameraContainer').style.display = 'none';
        document.getElementById('statusPanel').style.display = 'none';
        document.getElementById('resultScreen').style.display = 'block';
        
        document.getElementById('finalText1').innerHTML = formatResultText(firstQR.text);
        document.getElementById('finalText2').innerHTML = formatResultText(secondQR.text);
    }

    function goBack() {
        firstQR = null; secondQR = null;
        window.twinDecryptMask = null;
        window.__applyTwinXor = false;
        
        document.getElementById('text1').innerText = "未検出";
        document.getElementById('text2').innerText = "未検出";
        
        document.getElementById('resultScreen').style.display = 'none';
        document.getElementById('cameraContainer').style.display = 'block';
        document.getElementById('statusPanel').style.display = 'block';
        
        ctx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
        isScanning = true;
        requestAnimationFrame(scanLoop);
    }

    function drawBoundingBox(points, color) {
        if (!points || points.length < 3) return;
        ctx.beginPath();
        ctx.moveTo(points[0].x, points[0].y);
        for (let i = 1; i < points.length; i++) ctx.lineTo(points[i].x, points[i].y);
        ctx.closePath();
        ctx.lineWidth = 6; ctx.strokeStyle = color; ctx.stroke();
        ctx.fillStyle = color + '44'; ctx.fill();
    }
</script>
</body>
</html>
